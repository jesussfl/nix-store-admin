services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nix-store-server
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env.development
    ports:
      - 3000:3000
      - 3002:3002
      - 4200:4200
    command: ["yarn", "dev:server"]
    environment:
      APP_ENV: development
      NODE_ENV: development
      DB_HOST: database
      DB_PORT: 5432
      GRAPHQL_SCHEMA_URL: http://localhost:3000/admin-api
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /usr/src/app/src
        - action: sync+restart
          path: ./static
          target: /usr/src/app/static
        - action: sync+restart
          path: ./images
          target: /usr/src/app/images
        - action: sync+restart
          path: ./.env.development
          target: /usr/src/app/.env.development
        - action: sync+restart
          path: ./tsconfig.json
          target: /usr/src/app/tsconfig.json
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./yarn.lock
  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nix-store-worker
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env.development
    command: ["yarn", "dev:worker"]
    environment:
      APP_ENV: development
      NODE_ENV: development
      DB_HOST: database
      DB_PORT: 5432
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /usr/src/app/src
        - action: sync+restart
          path: ./static
          target: /usr/src/app/static
        - action: sync+restart
          path: ./images
          target: /usr/src/app/images
        - action: sync+restart
          path: ./.env.development
          target: /usr/src/app/.env.development
        - action: sync+restart
          path: ./tsconfig.json
          target: /usr/src/app/tsconfig.json
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./yarn.lock
  database:
    image: postgres:16-alpine
    container_name: nix-store-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vendure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vendure"]
      interval: 10s
      timeout: 5s
      retries: 10
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.2
    container_name: elasticsearch-vendure
    profiles:
      - elasticsearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
    networks:
      - esnet
volumes:
  postgres_data:
  esdata:
    driver: local
networks:
  esnet:
