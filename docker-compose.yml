version: "3.8"

services:
  # Main application server
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    command: ["yarn", "run", "dev:server"]
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - uploads:/usr/src/app/static
    environment:
      APP_ENV: development
      NODE_ENV: development
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: vendure
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_SYNCHRONIZE: "true"
      DB_SCHEMA: public
      COOKIE_SECRET: dev-cookie-secret-key
      SUPERADMIN_USERNAME: admin
      SUPERADMIN_PASSWORD: admin123
      PORT: 3000
      ASSET_UPLOAD_DIR: /usr/src/app/static/assets
      GRAPHQL_SCHEMA_URL: http://localhost:3000/admin-api
    depends_on:
      - database
    networks:
      - vendure-network

  # Background worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["yarn", "run", "dev:worker"]
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - uploads:/usr/src/app/static
    environment:
      APP_ENV: development
      NODE_ENV: development
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: vendure
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_SYNCHRONIZE: true
      DB_SCHEMA: public
      COOKIE_SECRET: dev-cookie-secret-key
      SUPERADMIN_USERNAME: admin
      SUPERADMIN_PASSWORD: admin123
      ASSET_UPLOAD_DIR: /usr/src/app/static/assets
      GRAPHQL_SCHEMA_URL: http://localhost:3000/admin-api
    depends_on:
      - database
    networks:
      - vendure-network

  # PostgreSQL database
  database:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vendure
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    networks:
      - vendure-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vendure"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and session storage
