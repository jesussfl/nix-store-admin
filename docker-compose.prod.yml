version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["yarn", "run", "start:server"]
    environment:
      NODE_ENV: production
      DB_SYNCHRONIZE: "false"
    volumes:
      - uploads:/usr/src/app/static
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["yarn", "run", "start:worker"]
    environment:
      NODE_ENV: production
      DB_SYNCHRONIZE: "false"
    volumes:
      - uploads:/usr/src/app/static
    restart: unless-stopped

  database:
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    command: postgres -c 'max_connections=200' -c 'shared_buffers=256MB'

  elasticsearch:
    environment:
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"

  # Remove pgAdmin in production
  pgadmin:
    profiles:
      - dev
