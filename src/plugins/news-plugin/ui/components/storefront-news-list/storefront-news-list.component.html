<vdr-page-block>
  <vdr-action-bar>
    <vdr-ab-left></vdr-ab-left>
    <vdr-ab-right>
      <button class="button primary" [routerLink]="['./', 'create']">
        <clr-icon shape="plus"></clr-icon>
        Crear noticia
      </button>
    </vdr-ab-right>
  </vdr-action-bar>
</vdr-page-block>

<vdr-data-table-2
  id="storefront-news-list"
  [items]="items$ | async"
  [itemsPerPage]="itemsPerPage$ | async"
  [totalItems]="totalItems$ | async"
  [currentPage]="currentPage$ | async"
  [filters]="filters"
  (pageChange)="setPageNumber($event)"
  (itemsPerPageChange)="setItemsPerPage($event)"
>
  <vdr-dt2-search [searchTermControl]="searchTermControl" searchTermPlaceholder="Buscar por titulo" />

  <vdr-dt2-column id="image" heading="Imagen">
    <ng-template let-item="item">
      <img *ngIf="item.imageAsset?.preview" class="news-thumb" [src]="item.imageAsset.preview" [alt]="item.title" />
    </ng-template>
  </vdr-dt2-column>

  <vdr-dt2-column id="title" heading="Titulo" [sort]="sorts.get('title')">
    <ng-template let-item="item">
      <a class="button-ghost" [routerLink]="['./', item.id]">
        <span>{{ item.title }}</span>
        <clr-icon shape="arrow right"></clr-icon>
      </a>
    </ng-template>
  </vdr-dt2-column>

  <vdr-dt2-column id="summary" heading="Resumen">
    <ng-template let-item="item">
      <span class="summary-cell">{{ item.summary }}</span>
    </ng-template>
  </vdr-dt2-column>

  <vdr-dt2-column id="sortOrder" heading="Orden" [sort]="sorts.get('sortOrder')">
    <ng-template let-item="item">
      {{ item.sortOrder }}
    </ng-template>
  </vdr-dt2-column>

  <vdr-dt2-column id="isPublished" heading="Publicado" [sort]="sorts.get('isPublished')">
    <ng-template let-item="item">
      <vdr-status-badge [type]="item.isPublished ? 'success' : 'warning'">
        {{ item.isPublished ? "Si" : "No" }}
      </vdr-status-badge>
    </ng-template>
  </vdr-dt2-column>

  <vdr-dt2-column id="updatedAt" heading="Actualizado" [sort]="sorts.get('updatedAt')">
    <ng-template let-item="item">
      {{ item.updatedAt | localeDate : "short" }}
    </ng-template>
  </vdr-dt2-column>
</vdr-data-table-2>
